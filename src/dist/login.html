<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <main class="login-page d-flex align-items-center justify-content-center">

  <div class="login-card p-4 p-md-5">

    <div class="text-center mb-4">
      <img src="../assets/img/streaming_logo.png" alt="Logo Fluxr" width="120">
    </div>

    <h1 class="h3 text-center mb-4">Accedi</h1>

    <form>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Inserisci email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Inserisci password">
      </div>

      <div class="d-grid mb-3">
        <button class="btn login-btn">Accedi</button>
      </div>

      <div class="text-center small">
        <a href="#" class="login-link">Password dimenticata?</a>
      </div>

      <p class="text-center mt-4 small">
        Non hai un account?
        <a href="#" class="login-link">Registrati</a>
      </p>
    </form>

  </div>

</main>

</body>
</html>
