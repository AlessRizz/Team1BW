<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registrazione | FLUXR</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-viola sticky-top px-lg-5">
      <div class="container-fluid">

        <a class="navbar-brand me-4" href="./index.html">
          <img src="../assets/img/streaming_logo.png" alt="logo" width="110">
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
          data-bs-target="#Navbar">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="Navbar">
          <ul class="navbar-nav me-auto fw-bold">
            <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Film</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Serie TV</a></li>
          </ul>

          <div class="d-flex align-items-center gap-3">
            <a href="./login.html" class="btn btn-outline-light btn-sm">Accedi</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero-section text-center py-2">
      <h1>Unisciti a FLUXR</h1>
      <p>Crea il tuo account e inizia a guardare contenuti esclusivi</p>
    </section>
  </header>

  <!-- REGISTER -->
  <main class="d-flex justify-content-center py-2">
    <div class="register-card p-4">

      <h2 class="text-center mb-4">Registrati</h2>

      <form id="registerForm" novalidate>

        <div class="mb-3">
          <label class="form-label">Nome utente</label>
          <input type="text" class="form-control" id="name">
          <small class="text-danger" id="nameError"></small>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email">
          <small class="text-danger" id="emailError"></small>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password">
          <small class="text-danger" id="passwordError"></small>
        </div>

        <div class="mb-3">
          <label class="form-label">Conferma Password</label>
          <input type="password" class="form-control" id="confirmPassword">
          <small class="text-danger" id="confirmPasswordError"></small>
        </div>

        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="terms">
          <label class="form-check-label">Accetto i termini</label>
          <small class="text-danger d-block" id="termsError"></small>
        </div>

        <!-- Honeypot -->
        <div class="d-none">
          <input type="text" id="website">
        </div>

        <div class="d-grid">
          <button type="submit" class="btn register-btn">Registrati</button>
        </div>

        <p class="text-danger mt-3" id="formError"></p>
        <p class="text-success mt-3" id="formSuccess"></p>

        <p class="text-center mt-4">
          Hai già un account?
          <a href="./login.html">Accedi</a>
        </p>

      </form>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer-stream py-5 bg-viola">
    <div class="container text-center">

      <div class="mb-4">
        <img src="../assets/img/streaming_logo.png" width="100">
      </div>

      <ul class="list-inline mb-3">
        <li class="list-inline-item"><a href="#">Privacy</a></li>
        <li class="list-inline-item"><a href="#">Aiuto</a></li>
        <li class="list-inline-item"><a href="#">Cookie</a></li>
      </ul>

      <p class="small">© 2026 FLUXR Streaming</p>

      <div>
        <i class="bi bi-facebook mx-2"></i>
        <i class="bi bi-instagram mx-2"></i>
      </div>

    </div>
  </footer>

  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/register.js"></script>

</body>
</html>
