<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player — FLUXR</title>
  <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./player.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-ui.js"></script>
</head>

<body>

  <nav class="player-nav">
    <a href="../index.html">
      <img class="logo" src="../../assets/img/streaming_logo.webp" alt="FLUXR" />
    </a>
    <button id="btn-back">
      <i class="bi bi-arrow-left"></i> Torna indietro
    </button>
  </nav>

  <main id="player-section">

    
    <div id="yt-wrapper" class="d-none">
      <div id="yt-player"></div>
    </div>

    
    <div id="vjs-wrapper" class="d-none">
      <video-player>
        <media-container class="media-default-skin media-default-skin--video">

          <video playsinline></video>

          <media-poster>
            <img id="vjs-poster" src="" alt="" />
          </media-poster>

          <media-buffering-indicator class="media-buffering-indicator">
            <div class="media-surface">
              <svg class="media-icon" xmlns="http://www.w3.org/2000/svg"
                   width="18" height="18" fill="currentColor" viewBox="0 0 18 18">
                <rect width="2" height="5" x="8" y=".5" opacity=".5" rx="1">
                  <animate attributeName="opacity" begin="0s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="2" height="5" x="12.243" y="2.257" opacity=".45" rx="1" transform="rotate(45 13.243 4.757)">
                  <animate attributeName="opacity" begin="0.125s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="5" height="2" x="12.5" y="8" opacity=".4" rx="1">
                  <animate attributeName="opacity" begin="0.25s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="5" height="2" x="10.743" y="12.243" opacity=".35" rx="1" transform="rotate(45 13.243 13.243)">
                  <animate attributeName="opacity" begin="0.375s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="2" height="5" x="8" y="12.5" opacity=".3" rx="1">
                  <animate attributeName="opacity" begin="0.5s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="2" height="5" x="3.757" y="10.743" opacity=".25" rx="1" transform="rotate(45 4.757 13.243)">
                  <animate attributeName="opacity" begin="0.625s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="5" height="2" x=".5" y="8" opacity=".15" rx="1">
                  <animate attributeName="opacity" begin="0.75s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
                <rect width="5" height="2" x="2.257" y="3.757" opacity=".1" rx="1" transform="rotate(45 4.757 4.757)">
                  <animate attributeName="opacity" begin="0.875s" dur="1s" repeatCount="indefinite" values="1;0"/>
                </rect>
              </svg>
            </div>
          </media-buffering-indicator>

          <media-controls class="media-surface media-controls">
            <media-tooltip-group>
              <div class="media-button-group">
                <media-play-button commandfor="play-tip"
                  class="media-button media-button--subtle media-button--icon media-button--play">
                </media-play-button>
                <media-tooltip id="play-tip" side="top" class="media-surface media-tooltip"></media-tooltip>

                <media-seek-button commandfor="bwd-tip" seconds="-10"
                  class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container">
                    <svg class="media-icon media-icon--flipped" xmlns="http://www.w3.org/2000/svg"
                         width="18" height="18" fill="none" viewBox="0 0 18 18">
                      <path fill="currentColor" d="M1 9c0 2.21.895 4.21 2.343 5.657l1.414-1.414a6 6 0 1 1 8.956-7.956l-1.286 1.286a.25.25 0 0 0 .177.427h4.146a.25.25 0 0 0 .25-.25V2.604a.25.25 0 0 0-.427-.177l-1.438 1.438A8 8 0 0 0 1 9"/>
                    </svg>
                    <span class="media-icon__label">10</span>
                  </span>
                </media-seek-button>
                <media-tooltip id="bwd-tip" side="top" class="media-surface media-tooltip">-10 sec</media-tooltip>

                <media-seek-button commandfor="fwd-tip" seconds="10"
                  class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container">
                    <svg class="media-icon" xmlns="http://www.w3.org/2000/svg"
                         width="18" height="18" fill="none" viewBox="0 0 18 18">
                      <path fill="currentColor" d="M1 9c0 2.21.895 4.21 2.343 5.657l1.414-1.414a6 6 0 1 1 8.956-7.956l-1.286 1.286a.25.25 0 0 0 .177.427h4.146a.25.25 0 0 0 .25-.25V2.604a.25.25 0 0 0-.427-.177l-1.438 1.438A8 8 0 0 0 1 9"/>
                    </svg>
                    <span class="media-icon__label">10</span>
                  </span>
                </media-seek-button>
                <media-tooltip id="fwd-tip" side="top" class="media-surface media-tooltip">+10 sec</media-tooltip>
              </div>

              <div class="media-time-controls">
                <media-time type="current" class="media-time"></media-time>
                <media-time-slider class="media-slider">
                  <media-slider-track class="media-slider__track">
                    <media-slider-fill  class="media-slider__fill"></media-slider-fill>
                    <media-slider-buffer class="media-slider__buffer"></media-slider-buffer>
                  </media-slider-track>
                  <media-slider-thumb class="media-slider__thumb"></media-slider-thumb>
                </media-time-slider>
                <media-time type="duration" class="media-time"></media-time>
              </div>

              <div class="media-button-group">
                <media-mute-button commandfor="vol-pop"
                  class="media-button media-button--subtle media-button--icon media-button--mute">
                </media-mute-button>
                <media-popover id="vol-pop" open-on-hover delay="200" close-delay="100"
                  side="top" class="media-surface media-popover media-popover--volume">
                  <media-volume-slider class="media-slider" orientation="vertical" thumb-alignment="edge">
                    <media-slider-track class="media-slider__track">
                      <media-slider-fill class="media-slider__fill"></media-slider-fill>
                    </media-slider-track>
                    <media-slider-thumb class="media-slider__thumb media-slider__thumb--persistent"></media-slider-thumb>
                  </media-volume-slider>
                </media-popover>

                <media-fullscreen-button commandfor="fs-tip"
                  class="media-button media-button--subtle media-button--icon media-button--fullscreen">
                </media-fullscreen-button>
                <media-tooltip id="fs-tip" side="top" class="media-surface media-tooltip">Fullscreen</media-tooltip>
              </div>
            </media-tooltip-group>
          </media-controls>

          <media-hotkey keys="Space"      action="togglePaused"></media-hotkey>
          <media-hotkey keys="k"          action="togglePaused"></media-hotkey>
          <media-hotkey keys="m"          action="toggleMuted"></media-hotkey>
          <media-hotkey keys="f"          action="toggleFullscreen"></media-hotkey>
          <media-hotkey keys="ArrowRight" action="seekStep" value="5"></media-hotkey>
          <media-hotkey keys="ArrowLeft"  action="seekStep" value="-5"></media-hotkey>
          <media-hotkey keys="l"          action="seekStep" value="10"></media-hotkey>
          <media-hotkey keys="j"          action="seekStep" value="-10"></media-hotkey>
          <media-hotkey keys="ArrowUp"    action="volumeStep" value="0.05"></media-hotkey>
          <media-hotkey keys="ArrowDown"  action="volumeStep" value="-0.05"></media-hotkey>

          <media-gesture type="tap"       action="togglePaused"     pointer="mouse" region="center"></media-gesture>
          <media-gesture type="doubletap" action="seekStep" value="-10" region="left"></media-gesture>
          <media-gesture type="doubletap" action="toggleFullscreen"      region="center"></media-gesture>
          <media-gesture type="doubletap" action="seekStep" value="10"   region="right"></media-gesture>

        </media-container>
      </video-player>
    </div>

    <div class="video-meta">
      <h1 id="meta-title">Caricamento…</h1>
      <p  id="meta-subtitle"></p>
    </div>

  </main>

  <div id="player-error" class="d-none">
    Video non trovato o id non valido.<br>
    <a href="../index.html">← Torna alla home</a>
  </div>

  <script type="module" src="../../../node_modules/@videojs/core/dist/default/index.js"></script>

  <script type="module" src="./player.js"></script>

</body>
</html>
